<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - DealForge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: #0a0a0f; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #151525; border: 1px solid #1a1a2e; border-radius: 16px; 
                    padding: 48px; width: 420px; max-width: 90%; }
        .logo { text-align: center; font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 32px; }
        .logo span { color: #6c63ff; }
        h1 { font-size: 24px; text-align: center; margin-bottom: 8px; color: #fff; }
        .subtitle { text-align: center; color: #808090; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: #a0a0b0; margin-bottom: 6px; }
        input { width: 100%; padding: 12px 16px; background: #0a0a0f; border: 1px solid #1a1a2e;
                border-radius: 8px; color: #fff; font-size: 14px; }
        input:focus { outline: none; border-color: #6c63ff; }
        .btn { width: 100%; padding: 14px; background: #6c63ff; color: #fff; border: none;
               border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn:hover { background: #5a52e0; }
        .error { background: #3d1a1a; border: 1px solid #ff3333; color: #ff6666; padding: 12px; 
                border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .footer-text { text-align: center; margin-top: 24px; font-size: 14px; color: #808090; }
        .footer-text a { color: #6c63ff; text-decoration: none; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: #808090; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">Deal<span>Forge</span></div>
        <h1>Create Your Account</h1>
        <p class="subtitle">Start with 7 expert AI agents. Free forever.</p>
        <div class="error" id="error"></div>
        <form id="auth-form">
            <input type="hidden" name="action" value="signup">
            <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="8">
            </div>
            <button type="submit" class="btn">Create Free Account</button>
        </form>
        <div class="footer-text">Already have an account? <a href='/login'>Sign in</a></div>
        <div class="back-link"><a href="/">← Back to home</a></div>
    </div>
    <script>
        document.getElementById("auth-form").onsubmit = async function(e) {
            e.preventDefault();
            const form = new FormData(this);
            const data = Object.fromEntries(form.entries());
            
            if (data.password && data.password.length < 8) {
                document.getElementById("error").textContent = "Password must be at least 8 characters";
                document.getElementById("error").style.display = "block";
                return;
            }
            
            try {
                const resp = await fetch("/api/auth/" + data.action, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(data)
                });
                const result = await resp.json();
                if (resp.ok) {
                    if (data.action === "login") {
                        window.location.href = "/dashboard";
                    } else {
                        window.location.href = "/login?registered=1";
                    }
                } else {
                    document.getElementById("error").textContent = result.detail || "Error";
                    document.getElementById("error").style.display = "block";
                }
            } catch (e) {
                document.getElementById("error").textContent = "Connection error. Try again.";
                document.getElementById("error").style.display = "block";
            }
        };
    </script>
</body>
</html>
