# Runbook: Context Poisoning Recovery
type: context_poisoning
severity: P2
trigger: state_corruption | wrong_agent_state | empty_context | prompt_injection_detected
auto_recovery_target: 95%
steps:
  - id: rb3-s1
    action: checkpoint
    params:
      restore_from: last_known_good
      validate_integrity: true
    timeout: 15
    on_failure: goto_s2
  - id: rb3-s2
    action: retry
    params:
      max_attempts: 1
      reinitialize_context: true
    timeout: 10
    on_failure: goto_s3
  - id: rb3-s3
    action: escalate
    params:
      to: T2_Security_Engineer
      notify_channels: [dashboard, slack]
      ticket_priority: P1
      forensics_copy: true
    timeout: 300
fallback: runbook-state-corruption
escalate_to: T2_Security
post_mortem: true
