# Runbook: Tool Call Failure Recovery
type: tool_failure
severity: P3
trigger: api_timeout | api_500 | api_malformed
auto_recovery_target: 95%
steps:
  - id: rb1-s1
    action: retry
    params:
      max_attempts: 3
      backoff: exponential (1s, 2s, 4s)
      jitter: 0.1
    timeout: 30
    on_failure: goto_s2
  - id: rb1-s2
    action: fallback
    params:
      fallback_tool: cache | degraded_api | local_mock
      log_warning: true
    timeout: 10
    on_failure: goto_s3
  - id: rb1-s3
    action: escalate
    params:
      to: T2_Domain_Lead
      notify_channels: [dashboard, slack, email]
      ticket_priority: P2
    timeout: 300
    on_failure: escalate_to_t1
fallback: runbook-model-degradation
escalate_to: T2
post_mortem: true
