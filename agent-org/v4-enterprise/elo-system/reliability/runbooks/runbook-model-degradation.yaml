# Runbook: Model Degradation Recovery
type: model_degradation
severity: P1-P3 (depends on scope)
trigger: latency_spike | empty_response | garbage_output | model_unavailable
auto_recovery_target: 85%
steps:
  - id: rb2-s1
    action: retry
    params:
      max_attempts: 2
      alternate_endpoint: true
      timeout_ms: 15000
    timeout: 30
    on_failure: goto_s2
  - id: rb2-s2
    action: fallback
    params:
      fallback_model: secondary_provider
      quality_degradation: acceptable
      log_model_incident: true
    timeout: 20
    on_failure: goto_s3
  - id: rb2-s3
    action: checkpoint
    params:
      save_agent_state: true
      queue_for_later: 3600
    timeout: 10
    on_failure: goto_s4
  - id: rb2-s4
    action: escalate
    params:
      to: T1_CTO
      notify_channels: [dashboard, slack, sms, phone]
      ticket_priority: P1
    timeout: 600
fallback: runbook-full-outage
escalate_to: T1
post_mortem: true
