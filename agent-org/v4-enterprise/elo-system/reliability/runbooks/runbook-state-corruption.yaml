# Runbook: State Corruption Recovery
type: state_corruption
severity: P2
trigger: session_lost | checkpoint_fail | duplicate_session
auto_recovery_target: 95%
steps:
  - id: rb5-s1
    action: checkpoint
    params:
      restore_from: last_checkpoint
      verify_integrity: true
    timeout: 15
    on_failure: goto_s2
  - id: rb5-s2
    action: fallback
    params:
      restore_from: secondary_checkpoint
      replay_actions_from_log: true
    timeout: 30
    on_failure: goto_s3
  - id: rb5-s3
    action: escalate
    params:
      to: T2_Engineering_Manager
      notify_channels: [dashboard, slack]
      ticket_priority: P2
      data_recovery_needed: true
    timeout: 600
fallback: runbook-tool-failure
escalate_to: T2_Eng
post_mortem: true
