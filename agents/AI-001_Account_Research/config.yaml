# AI-001 Account Research Agent Configuration
research:
  default_depth: standard  # quick | standard | deep
  max_accounts_per_cycle: 10
  monitor_interval_hours: 24
  refresh_interval_days:
    active_pursuit: 7
    target_list: 30
    archive: 90

sources:
  crunchbase:
    enabled: true
    api_key_env: CRUNCHBASE_API_KEY
  builtwith:
    enabled: true
    api_key_env: BUILTWITH_API_KEY
  wappalyzer:
    enabled: true
  newsapi:
    enabled: true
    api_key_env: NEWS_API_KEY
  linkedin_salesnav:
    enabled: true
  glassdoor:
    enabled: true

verification:
  min_sources_for_high_confidence: 3
  min_sources_for_medium_confidence: 2
  max_contradictions_before_flag: 3

feedback:
  p1_retrain_threshold: 0.15
  p0_escalation_threshold: 0.20
  weekly_audit_enabled: true

nats:
  servers:
    - nats://localhost:4222
  subjects:
    intelligence_profile: ai.account.intelligence.profile
    org_chart: ai.account.org_chart
    signal: ai.account.signal
    financial: ai.account.financial
    techstack: ai.account.techstack
    competitive: ai.account.competitive
    research_completed: ai.account.research.completed
    feedback: ai.account.research.feedback
    data_gap: ai.account.data_gap
    prompt_drift: ai.account.research.prompt_drift

llm:
  provider: openrouter  # openrouter | anthropic
  model: openrouter/auto
  temperature: 0.3
  max_tokens: 4000
  fallback_models:
    - openrouter/auto
